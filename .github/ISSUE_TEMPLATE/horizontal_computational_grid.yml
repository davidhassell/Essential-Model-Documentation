      value: |
        ---
        
        ## Issue Handling
        
        **After submission:**
        - Creates one `horizontal_subgrid` (s###) per filled slot
        - Creates `horizontal_computational_grid` (h###) linking all subgrids
        - Use the h### ID with a v### in Stage 3 (Model Component)
        - [Track progress in issue comments](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues?q=is%3Aissue%20author%3A%40me)

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
