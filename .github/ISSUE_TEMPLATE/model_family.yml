  - type: dropdown
    id: scientific_domains
    attributes:
      multiple: true
      label: Scientific Domains
      description: |
        All scientific domains covered by any member of this family. **Select multiple.**
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Domains covered**
        
        All domains covered by ANY member of this family.
        
        - aerosol, atmosphere, atmospheric-chemistry
        - land-ice, land-surface
        - ocean, ocean-biogeochemistry, sea-ice
        
        Individual models may cover a subset.
        
        </details>
      options:
        - "aerosol"
        - "atmosphere"
        - "atmospheric-chemistry"
        - "land-ice"
        - "land-surface"
        - "ocean"
        - "ocean-biogeochemistry"
    validations:
      required: true

  - type: input
    id: established
    attributes:
      label: Year Established
      description: |
        The year when this family was first developed.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Year established**
        
        When the family was first developed.
        
        **Leave blank if:** Unknown.
        
        </details>
      placeholder: "2009"

  - type: input
    id: representative_member
    attributes:
      label: Representative Member
      description: |
        A well-known configuration from this family that serves as a representative example.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Canonical configuration**
        
        A well-known member for quick reference.
        
        **Examples:** HadGEM3-GC31-LL, CESM2, CNRM-CM6-1
        
        </details>
      placeholder: "HadGEM3-GC31-LL"

  - type: input
    id: website
    attributes:
      label: Website
      description: |
        The official documentation URL for this family.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Documentation URL**
        
        Official website with family documentation, technical references, or code access.
        
        </details>
      placeholder: "https://www.metoffice.gov.uk/research/approach/modelling-systems/unified-model"

  - type: textarea
    id: references
    attributes:
      label: Reference DOIs
      description: The DOI URLs for family-level publications.
      placeholder: "https://doi.org/10.1029/2019MS001995"

  - type: markdown
    attributes:
      value: |
        ---
        
        ## Issue Handling
        
        **After submission:**
        - Creates `model_family` entry
        - Earth System Families can be referenced in Stage 4 (Model)
        - Component Families can be referenced in Stage 3 (Model Component)
        - [Track progress in issue comments](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues?q=is%3Aissue%20author%3A%40me)

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "user1,user2,user3,..."
