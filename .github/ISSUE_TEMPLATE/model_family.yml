name: Model Family Registration
description: Register a model family for genealogy tracking
title: "[EMD] Stage 2: Model Family: [do not edit]"
labels: ['emd-submission', 'model_family', 'Review']
body:
  - type: markdown
    attributes:
      value: |
        ## Model Family Registration
        
        Registers a family of related models or components that share code.
        
        **Prerequisites:** None — submit before Stage 3 or 4 if needed.
        
        > [!NOTE]
        > Please ensure you are familiar with the completion guidance in the collapsible dropdown where it exists. Failure to do so will result in a failed submission.
        > To modify an existing entry, see __[modifying entries](https://github.com/WCRP-CMIP/Essential-Model-Documentation/tree/production?tab=contributing-ov-file#2-modifying-or-reusing-existing-entries)__.
        
        _Optional — submit at any time. Referenced in [Step 3: Model Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml) and [Step 4: Model](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model.yml)._

  - type: input
    id: name
    attributes:
      label: Family Name
      description: |
        The short identifier for this model family.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Family identifier**
        
        Short name, often the first part of model names.
        
        **Examples:** HadGEM3, CESM, CNRM-CM, ACCESS, NEMO, CLM
        
        **Conventions:**
        - Use hyphens as separators
        - Typically: institution/project acronym + model type
        
        See [Masson and Knutti (2011)](https://doi.org/10.1029/2011GL046864) for model genealogy examples.
        
        </details>
      placeholder: "HadGEM3"
    validations:
      required: true

  - type: dropdown
    id: family_type
    attributes:
      label: Family Type
      description: |
        Whether this is a coupled Earth System family or a single-domain Component family.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Family classification**
        
        Determines how this family is used in the workflow.
        
        **Earth System Model:**
        - Coupled models with multiple interacting components
        - Include atmosphere AND ocean/land-surface
        - Examples: CESM, HadGEM3, CNRM-CM, ACCESS, IPSL-CM
        - Referenced in Stage 4 (Model)
        
        **Component Family:**
        - Single scientific domain
        - May be coupled into larger systems
        - Examples: NEMO (ocean), CAM (atmosphere), CLM (land)
        - Referenced in Stage 3 (Model Component)
        
        </details>
      options:
        - "Not specified"
        - "component"
        - "model"
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        A description of what characterizes this model family including scientific focus and common code.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Family characterization**
        
        **What to include:**
        1. Scientific focus and approach
        2. Common code base and physics
        3. How family members differ (resolution, components, parameters)
        
        2-3 paragraphs typical.
        
        </details>
      placeholder: "1. Scientific focus and approach
2. Common code base and physics
3. How family members differ"
    validations:
      required: true

