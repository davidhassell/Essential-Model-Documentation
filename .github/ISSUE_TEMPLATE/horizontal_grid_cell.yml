        # Reusable Grid Cell
        
        > [!TIP]
        > **Using a pre-registered grid cell?** Select from the list below to auto-populate fields.
        >
        > NOTE: You must right-click and select `Open in New Window` or press `Ctrl+R` to refresh after selecting in order for the pre-filled links to update.
        
        <details>
        <summary>Pre-registered Grid Cells (must be opened in a new window)</summary>
        
        {prefill_links}
        
        </details>
        
        # Stage 1: Horizontal Grid Cell
        
        Registers reusable grid cell definitions that can be referenced in Stage 2a.
        
        **Prerequisites:** None — this is the first step.
        
        > [!NOTE]
        > Please ensure you are familiar with the completion guidance in the collapsible dropdown where it exists. Failure to do so will result in a failed submission.
        
        ---
        
        ## Grid Cell Properties
        
        Define the physical grid structure that can be reused across multiple subgrid registrations in Stage 2a.

  - type: dropdown
    id: grid_type
    attributes:
      label: Grid Type
      description: |
        The cell distribution pattern that defines how grid cells are arranged across the domain.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Cell distribution pattern**
        
        Defines how grid cells are arranged across the domain.
        
        - **regular-latitude-longitude**: Uniform spacing in lat/lon
        - **reduced-gaussian**: Fewer points near poles (spectral models)
        - **tripolar**: North Pole singularity moved onto land (ocean models)
        - **displaced-pole**: Single rotated pole
        - **icosahedral**: Quasi-uniform spherical coverage
        - **cubed-sphere**: Six cube faces projected onto sphere
        - **adaptive-mesh**: Dynamically refined regions
        
        See [CF Conventions grid mappings](http://cfconventions.org/Data/cf-conventions/cf-conventions-1.10/cf-conventions.html#appendix-grid-mappings) for details.
        
        </details>
      options:
        - "Not specified"
        - "Cubic Octahedral Spectral Reduced Gaussian"
        - "Displaced Pole"
        - "Hierarchical Discrete Global Grid"
        - "Icosahedral"
        - "Icosahedral Geodesic"
        - "Icosahedral Geodesic Dual"
        - "Linear Spectral Gaussian"
        - "Plane Projection"
        - "Quadratic Spectral Gaussian"
        - "Reduced Gaussian"
        - "Regular Gaussian"
        - "Regular Latitude-Longitude"
        - "Spectral Gaussian"
        - "Spectral Reduced Gaussian"
        - "Stretched"
        - "Tripolar"
        - "Unstructured"
        - "Unstructured Polygonal"
        - "Unstructured Quadrilateral"
        - "Unstructured Triangular"
        - "Yin-Yang"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: grid_mapping
    attributes:
      label: Coordinate System
      description: |
        The reference coordinate system used for cell positions.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Coordinate reference system**
        
        Defines how cell positions are located.
        
        - **latitude-longitude**: Standard geographic coordinates
        - **rotated-latitude-longitude**: Pole moved to reduce distortion over region of interest
        - **stereographic**: Polar projection (polar regions)
        - **lambert-conformal**: Mid-latitude regional projection
        
        </details>
      options:
        - "Not specified"
        - "Albers Conical Equal Area"
        - "Azimuthal Equidistant"
        - "HEALPix"
        - "Lambert Azimuthal Equal Area"
        - "Lambert Conformal Conic"
        - "Lambert Cylindrical Equal Area"
        - "Latitude-Longitude"
        - "Mercator"
        - "Orthographic"
        - "Polar Stereographic"
        - "Rotated Latitude-Longitude"
        - "Sinusoidal"
        - "Stereographic"
        - "Transverse Mercator"
        - "Vertical Perspective"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      multiple: true
      label: Region
      description: |
        The geographic coverage area of the grid.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Geographic coverage**
        
        - **global**: Full Earth coverage
        - **regional**: Limited area domain
        - **arctic/antarctic**: Polar-focused domains
        - **tropical**: Equatorial band
        
        Select multiple if the grid covers distinct regions.
        
        </details>
      options:
        - "Not specified"
        - "30S-90S"
        - "Antarctica"
        - "Arctic"
        - "Greenland"
        - "Limited Area"
        - "Northern Hemisphere"
        - "Southern Hemisphere"
        - "Tropics"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: temporal_refinement
    attributes:
      label: Temporal Refinement
      description: |
        Whether the grid changes over time during the simulation.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Time variation of grid**
        
        - **static**: Grid remains fixed throughout simulation
        - **adaptive**: Grid changes during runtime (adaptive mesh refinement)
        
        Most grids are static.
        
        </details>
      options:
        - "Not specified"
        - "Adaptive"
        - "Dynamically Stretched"
        - "Static"
      default: 0
    validations:
      required: true

  - type: input
    id: x_resolution
    attributes:
      label: X Resolution
      description: |
        The nominal cell size in the x-direction.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Zonal (x-direction) resolution**
        
        Nominal cell size. For spectral grids, use equivalent grid spacing.
        
        **Leave blank if:** Resolution varies by more than 25% across the domain.
        
        </details>
      placeholder: "1.25"

  - type: input
    id: y_resolution
    attributes:
      label: Y Resolution
      description: |
        The nominal cell size in the y-direction.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Meridional (y-direction) resolution**
        
        Nominal cell size.
        
        **Leave blank if:** Resolution varies by more than 25% across the domain.
        
        </details>
      placeholder: "0.9"

  - type: dropdown
    id: units
    attributes:
      label: Units
      description: The units used for resolution values.
      options:
        - "Not specified"
        - "Degrees"
        - "Kelvin"
        - "Kilometre"
        - "Meters"
        - "Pascal"
      default: 0

  - type: input
    id: n_cells
    attributes:
      label: Number of Cells
      description: |
        The total number of grid cells in the domain.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Total cell count**
        
        Number of cells in the horizontal grid.
        
        For reduced grids, count actual cells (not full Gaussian equivalent).
        
        </details>
      placeholder: "55296"

  - type: input
    id: southernmost_latitude
    attributes:
      label: Southernmost Latitude
      description: |
        The southernmost latitude of all grid cell centres, in degrees north (cells for which no calculations are made are included).
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Domain southern boundary**
        
        In degrees north (-90 to 90).
        
        For global grids with shifted pole, give latitude of southernmost cell center.
        
        </details>
      placeholder: "-89.5"

  - type: input
    id: westernmost_longitude
    attributes:
      label: Westernmost Longitude
      description: |
        The westernmost longitude of the southernmost grid cell centres, in degrees east (cells for which no calculations are made are included).
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Domain western boundary**
        
        In degrees east (0 to 360).
        
        For global grids, typically 0 or first cell center longitude.
        
        </details>
      placeholder: "0.5"

  - type: dropdown
    id: truncation_method
    attributes:
      label: Truncation Method
      description: |
        The spectral truncation type for spectral grids only.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Spectral truncation type** (spectral grids only)
        
        - **triangular**: T truncation (most common, e.g., T127)
        - **rhomboidal**: R truncation
        - **linear**: L truncation (linear grid)
        
        **Leave blank if:** Not a spectral grid.
        
        </details>
      options:
        - "Not specified"
        - "Rhomboidal Truncation"
        - "Triangular Truncation"
      default: 0

  - type: input
    id: truncation_number
    attributes:
      label: Truncation Number
      description: |
        The maximum wavenumber retained for spectral grids only.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Maximum wavenumber** (spectral grids only)
        
        Example: 127 for T127 truncation.
        
        **Leave blank if:** Not a spectral grid.
        
        </details>
      placeholder: "127"

  - type: input
    id: alias
    attributes:
      label: Alias
      description: |
        Optional, if you wish to describe where the grid is being used, and other names it may be known as.
      placeholder: "XXX1, YYY2,  comma deliminated entries.."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Optional free-text description of grid-specific details not captured by the fields above. Leave blank if the parameters fully describe the grid.

  - type: markdown
    attributes:
      value: |
        ---
        
        ## Issue Handling
        
        **After submission:**
        - Creates `horizontal_grid_cell` (g###)
        - Use g### IDs in Stage 2a (Horizontal Computational Grid) to build subgrids
        - [Track progress in issue comments](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues?q=is%3Aissue%20author%3A%40me)

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "user1,user2,user3,..."
