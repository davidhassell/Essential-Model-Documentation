name: "Stage 3: Add New Model Component"
description: Register a non-existing model component and grid configuration (Stage 3 of 4)
title: "[EMD] Stage 3: Model Component: [do not edit]"
labels: ['emd-submission', 'model_component', 'Review']
body:
  - type: markdown
    attributes:
      value: |
        | Step 1: Grid Cell | Step 2: Horizontal Grid / Vertical Grid | Step 3: Model Component | Step 4: Model |
        |:---:|:---:|:---:|:---:|
        | [Grid Cell](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_grid_cell.yml) | [Horizontal Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_computational_grid.yml) / [Vertical Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=vertical_computational_grid.yml) | **🟢 Model Component** | [Model](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model.yml) |
        
        # Stage 3: Model Component
        
        This form registers a single model component — its name, scientific domain, and a short description. The component can then be reused across as many models and grid configurations as you need.
        
        > [!NOTE]
        > Most fields have a **Detailed Guidance** dropdown. Please read it before completing that field — submissions that do not follow the guidance will fail validation.
        
        ---
        
        ## Component Definition

  - type: dropdown
    id: component
    attributes:
      label: Component Type
      description: |
        The scientific domain that this component simulates.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Scientific domain**
        
        The type of Earth system processes this component simulates.
        
        - **aerosol**: Aerosol behaviour and evolution in atmosphere
        - **atmosphere**: Atmospheric dynamics, thermodynamics, physics
        - **atmospheric-chemistry**: Atmospheric chemical composition
        - **land-ice**: Glaciers, ice sheets, ice shelves
        - **land-surface**: Surface-atmosphere fluxes, soil, vegetation, snow
        - **ocean**: Ocean dynamics, thermodynamics, physics
        - **ocean-biogeochemistry**: Marine carbon cycle, ecosystems
        - **sea-ice**: Sea ice thermodynamics and dynamics
        
        This becomes the domain prefix in your component_config ID.
        
        </details>
      options:
        - "Not specified"
        - "aerosol"
        - "atmosphere"
        - "atmospheric-chemistry"
        - "land-ice"
        - "land-surface"
        - "ocean"
        - "ocean-biogeochemistry"
        - "sea_ice"
      default: 0
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Component Name
      description: |
        The official component name including version information.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Official component name**
        
        Include version number.
        
        **Examples:**
        - NEMO v3.6
        - ARPEGE-Climat v6.3
        - CLM5
        
        **For embedded components** without an official name: use `HostName-domain` (e.g., 'ARPEGE-aerosol').
        
        </details>
      placeholder: "NEMO v3.6"
    validations:
      required: true

  - type: dropdown
    id: family
    attributes:
      label: Component Family
      description: |
        The component family that this component belongs to.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Component family**
        
        Group of related component versions sharing code.
        
        Useful for tracking component genealogy and shared development.
        
        **Leave as 'Not applicable' if:**
        - First/only version of this component
        - No family grouping exists
        - Standalone embedded component
        
        </details>
      options:
        - "arpege-climat"
        - "BISICLES"
        - "cable"
        - "CAM"
        - "canam"
        - "cannemo"
        - "class-ctem"
        - "CLASSIC"
        - "CLM"
        - "cmoc"
        - "CoLM"
        - "fesim"
        - "fesom"
        - "gelato"
        - "GEOS"
        - "glomap-mode"
        - "hadam"
        - "IAP-AGCM"
        - "ifs"
        - "jules"
        - "LICOM"
        - "lim"
        - "lpj-guess"
        - "M-SIM"
        - "metum"
        - "nemo"
        - "NICAM"
        - "no-family"
        - "pisces"
        - "PISM"
        - "reprobus"
        - "SI3"
        - "surfex"
        - "tactic"
        - "wombat"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        A scientific overview of the component including main processes and key physics.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Scientific overview**
        
        High-level description of the component's capabilities.
        
        **What to include:**
        1. Main processes simulated
        2. Key physics/parameterizations
        3. Notable features of this version
        
        Detailed physics should be in referenced publications.
        
        </details>
      placeholder: "1. Main processes simulated
2. Key physics/parameterizations
3. Notable features of this version"
    validations:
      required: true

  - type: input
    id: code_base
    attributes:
      label: Code Repository
      description: |
        The URL to the source code repository or 'private' if not publicly available.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Source code location**
        
        URL pointing to specific version/tag/commit.
        
        **Examples:**
        - `https://github.com/ESCOMP/CTSM/tree/release-clm5.0`
        - `https://forge.nemo-ocean.eu/nemo/nemo/-/tree/release-3.6`
        - DOI URL if archived (e.g., Zenodo)
        
        **Enter 'private'** if code is not publicly available.
        
        </details>
      placeholder: "https://forge.nemo-ocean.eu/nemo/nemo/-/tree/release-3.6"

  - type: textarea
    id: references
    attributes:
      label: Reference DOIs
      description: The DOI URLs for publications describing this component.
      placeholder: "https://doi.org/10.5194/gmd-8-1547-2015"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        ## Issue Handling
        
        **After submission:**
        - Creates a `model_component` entry
        - Once accepted and merged, link it to computational grids (see below)
        - [Track progress in issue comments](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues?q=is%3Aissue%20author%3A%40me)

  - type: markdown
    attributes:
      value: |
        ---
        
        > [!IMPORTANT]
        > ## Adding grid configurations
        >
        > This form no longer collects horizontal or vertical grids. Grids are linked in a separate step.
        >
        > Once this component has been **accepted and merged**, use the [Stage 3: Link Existing Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=link_existing_component.yml) form to attach computational grids and generate component configurations.
        >
        > This step is **fully automated** — you can submit as many grid configurations as you require, and each is processed without further review.

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "user1,user2,user3..."
