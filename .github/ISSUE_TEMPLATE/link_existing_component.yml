name: "Stage 3: Link Existing Component"
description: Link a registered model component to computational grids to create a component configuration (Stage 3 of 4)
title: "[EMD] Stage 3: Link Existing Component: [do not edit]"
labels: ['emd-submission', 'link_existing_component', 'component_config', 'Review']
body:
  - type: markdown
    attributes:
      value: |
        | Step 1: Grid Cell | Step 2: Horizontal Grid / Vertical Grid | Step 3: Model Component | Step 4: Model |
        |:---:|:---:|:---:|:---:|
        | [Grid Cell](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_grid_cell.yml) | [Horizontal Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_computational_grid.yml) / [Vertical Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=vertical_computational_grid.yml) | **🟢 Model Component** | [Model](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model.yml) |
        
        # Stage 3: Link Existing Component
        
        Use this form when the **model component is already registered** and you only
        need to link it to a new combination of horizontal and vertical computational grids.
        
        This creates a **component configuration** record only — no new component is registered.
        The resulting config ID (e.g. `ocean_nemo-v3-6_h101_v103`) is used in Stage 4 (Model).
        
        > [!NOTE]
        > If the component you need is **not** in the list below, use
        > [Stage 3: Model Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml)
        > to register it first.
        
        ---

  - type: dropdown
    id: model_component
    attributes:
      label: Model Component
      description: |
        Select the already-registered component you want to link to grids.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Registered model component**
        
        Choose the component from the list. It must already exist in the EMD registry.
        If it is not listed here, submit a
        [Stage 3: Model Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml)
        issue first, then return to this form.
        
        </details>
      options:
        - "Not specified"
        - "arpege-climat_version_6_3"
        - "bisicles-ukesm-ismip6-1_0"
        - "bisicles-ukesm1-3"
        - "cable3"
        - "canam5-1"
        - "canam5-1-aerosol"
        - "canam6"
        - "canam6-aerosol"
        - "cannemo5-1"
        - "cannemo6-0"
        - "cice5"
        - "class-ctem-v3-6-2"
